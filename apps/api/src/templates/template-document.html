<!DOCTYPE html>
<html lang="es-CR">
<head>
<meta charset="UTF-8">
<title>cl2 — documento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Figtree:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<!--ASSET_DATA_INJECTION_POINT-->
<style>
  :root {
    --paper: #faf5ec;
    --paper-warm: #f4ecdc;
    --ink: #0e1745;
    --ink-soft: #2a3460;
    --burgundy: #7a2237;
    --burgundy-deep: #5a1a2a;
    --accent: #f93549;
    --accent-soft: #ff6f6d;
    --line: rgba(14, 23, 69, 0.10);
    --line-soft: rgba(14, 23, 69, 0.05);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #fff; color: var(--ink);
    font-family: 'Figtree', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  }
  .doc { display: block; }
  .page {
    width: 210mm; min-height: 297mm; height: 297mm;
    background: var(--paper);
    position: relative; overflow: hidden;
    page-break-after: always; break-after: page;
    display: grid; grid-template-rows: 26mm 1fr 18mm;
    padding: 0 22mm;
  }
  .page:last-child { page-break-after: auto; break-after: auto; }

  .page::before {
    content: ''; position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(14,23,69,0.04) 0.6px, transparent 0.6px);
    background-size: 6mm 6mm;
    pointer-events: none; opacity: 0.45;
  }

  .page-header {
    display: flex; align-items: center; justify-content: space-between;
    position: relative; z-index: 2;
    padding-top: 14mm;
    border-bottom: 1px solid var(--line);
    padding-bottom: 6mm;
  }
  .brand-lockup { display: flex; align-items: center; gap: 8px; }
  .brand-mark {
    width: 24px; height: 24px; border-radius: 6px;
    background: linear-gradient(135deg, var(--accent), var(--accent-soft));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(249, 53, 73, 0.22);
  }
  .brand-mark svg { width: 14px; height: 14px; }
  .brand-text { display: flex; flex-direction: column; line-height: 1; }
  .brand-text .wm {
    font-family: 'Newsreader', serif; font-size: 14px; font-style: italic;
    font-weight: 500; letter-spacing: -0.01em; color: var(--ink);
  }
  .brand-text .tag {
    font-family: 'IBM Plex Mono', monospace; font-size: 7px;
    font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink); opacity: 0.5; margin-top: 2px;
  }
  .page-num {
    font-family: 'IBM Plex Mono', monospace; font-size: 9px;
    font-weight: 500; letter-spacing: 0.18em; color: var(--ink); opacity: 0.55;
  }
  .page-num b { color: var(--burgundy); font-weight: 600; }

  .page-body {
    position: relative; z-index: 2;
    padding: 12mm 0 12mm;
    overflow: hidden;
  }
  .eyebrow {
    font-family: 'IBM Plex Mono', monospace; font-size: 9.5px;
    font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--burgundy); margin-bottom: 8mm;
  }
  h1.display {
    font-family: 'Newsreader', serif; font-weight: 400;
    font-size: 46pt; line-height: 1.05; letter-spacing: -0.022em;
    color: var(--ink); text-wrap: balance;
  }
  h1.display em { font-style: italic; color: var(--burgundy); font-weight: 400; }
  h2.head {
    font-family: 'Newsreader', serif; font-weight: 500;
    font-size: 26pt; line-height: 1.15; letter-spacing: -0.018em;
    color: var(--ink); text-wrap: balance;
  }
  h2.head em { font-style: italic; color: var(--burgundy); font-weight: 500; }
  p.lede {
    font-family: 'Newsreader', serif; font-size: 15pt;
    line-height: 1.45; font-weight: 300; color: var(--ink-soft);
    margin-top: 6mm; max-width: 150mm;
  }
  p.lede em { font-style: italic; color: var(--burgundy); }
  p.body {
    font-family: 'Newsreader', serif; font-size: 11.5pt;
    line-height: 1.6; color: var(--ink-soft);
    margin-top: 5mm; text-align: justify; hyphens: auto;
  }
  p.body em { font-style: italic; color: var(--burgundy); }
  p.body + p.body { margin-top: 3.5mm; }

  .row-list {
    display: flex; flex-direction: column; gap: 5mm;
    margin-top: 8mm;
  }
  .row {
    display: grid; grid-template-columns: 22mm 1fr; gap: 6mm;
    align-items: baseline;
    padding-bottom: 4mm; border-bottom: 1px solid var(--line);
  }
  .row:last-child { border-bottom: none; }
  .row-num {
    font-family: 'IBM Plex Mono', monospace; font-size: 9.5pt;
    font-weight: 600; color: var(--burgundy); letter-spacing: 0.05em;
  }
  .row-title {
    font-family: 'Newsreader', serif; font-size: 14pt; font-weight: 500;
    line-height: 1.25; color: var(--ink);
  }
  .row-title em { font-style: italic; color: var(--burgundy); }
  .row-sub {
    font-family: 'Figtree', sans-serif; font-size: 10pt; font-weight: 400;
    color: var(--ink-soft); line-height: 1.5; margin-top: 1.5mm;
  }
  .alert {
    margin-top: 8mm; border-left: 3px solid var(--accent);
    padding: 6mm 8mm; background: rgba(249, 53, 73, 0.05);
    border-radius: 0 4mm 4mm 0;
  }
  .alert.warning { border-left-color: #d97706; background: rgba(217, 119, 6, 0.05); }
  .alert.note { border-left-color: var(--ink); background: rgba(14, 23, 69, 0.04); }
  .alert-eye {
    font-family: 'IBM Plex Mono', monospace; font-size: 8.5pt;
    font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--accent);
  }
  .alert.warning .alert-eye { color: #d97706; }
  .alert.note .alert-eye { color: var(--ink); }
  .alert h3 {
    font-family: 'Newsreader', serif; font-size: 16pt; font-weight: 500;
    line-height: 1.18; color: var(--ink); margin-top: 2mm; margin-bottom: 3mm;
  }
  .alert p {
    font-family: 'Newsreader', serif; font-size: 11pt; line-height: 1.55;
    color: var(--ink-soft);
  }
  .alert p em { font-style: italic; color: var(--burgundy); }
  .quote {
    margin-top: 8mm; padding-left: 8mm;
    border-left: 2px solid var(--burgundy);
  }
  .quote-text {
    font-family: 'Newsreader', serif; font-size: 16pt; font-style: italic;
    line-height: 1.35; color: var(--ink);
  }
  .quote-attr {
    font-family: 'IBM Plex Mono', monospace; font-size: 9pt;
    text-transform: uppercase; letter-spacing: 0.16em;
    color: var(--burgundy); margin-top: 4mm;
  }

  .page-footer {
    display: flex; align-items: center; justify-content: space-between;
    position: relative; z-index: 2;
    padding-bottom: 10mm;
    border-top: 1px solid var(--line);
    padding-top: 5mm;
  }
  .footer-meta {
    font-family: 'IBM Plex Mono', monospace; font-size: 8pt;
    font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink); opacity: 0.5;
  }
  .footer-meta b { color: var(--burgundy); opacity: 1; }

  /* Cover overrides */
  .page.cover {
    background: radial-gradient(ellipse 90% 70% at 50% 100%, rgba(122, 34, 55, 0.08), transparent 60%), var(--paper);
  }
  .page.cover .page-body { display: flex; flex-direction: column; justify-content: center; }
  .page.cover h1.display { font-size: 56pt; }
  .page.cover .cover-deco {
    position: absolute; top: 30mm; right: 18mm;
    font-family: 'Newsreader', serif; font-style: italic;
    font-size: 240pt; color: var(--burgundy);
    opacity: 0.06; line-height: 0.8; z-index: 1; pointer-events: none;
  }

  /* Section overrides */
  .page.section {
    background: var(--paper-warm);
  }
  .page.section .page-body { display: flex; flex-direction: column; justify-content: center; }
  .page.section h1.display { font-size: 38pt; }

  /* CTA / closing */
  .page.cta {
    background: radial-gradient(ellipse 70% 60% at 30% 30%, rgba(249, 53, 73, 0.08), transparent 60%), var(--burgundy-deep);
    color: var(--paper);
  }
  .page.cta .page-body { display: flex; flex-direction: column; justify-content: center; }
  .page.cta::before { opacity: 0.15; }
  .page.cta .brand-text .wm,
  .page.cta .brand-text .tag,
  .page.cta .page-num,
  .page.cta .footer-meta { color: var(--paper); opacity: 0.78; }
  .page.cta .page-num b { color: var(--accent-soft); opacity: 1; }
  .page.cta .eyebrow { color: var(--accent-soft); }
  .page.cta h1.display { color: var(--paper); font-size: 44pt; }
  .page.cta h1.display em { color: var(--accent-soft); }
  .page.cta p.lede { color: rgba(250, 245, 236, 0.85); }
  .page.cta .footer-meta b { color: var(--accent-soft); opacity: 1; }
  .page.cta .page-header,
  .page.cta .page-footer { border-color: rgba(250, 245, 236, 0.18); }

  @media print {
    @page { size: A4 portrait; margin: 0; }
    html, body { background: var(--paper); }
  }
</style>
</head>
<body>
<div class="doc" id="doc"></div>
<script>
(function () {
  const data = window.__ASSET_DATA__ || { content: { title: 'CL2', slides: [] }, options: {} };
  const { content, options } = data;
  const total = content.slides.length;

  function pad(n) { return String(n).padStart(2, '0'); }
  function emText(s) {
    if (!s) return '';
    const e = String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return e.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  }
  // Body markdown — for documents we want paragraph breaks. Split on
  // double newlines and produce one <p class="body"> per chunk. Inline
  // *italic* still applies via emText.
  function bodyToParagraphs(s) {
    if (!s) return '';
    return String(s)
      .split(/\n\s*\n/)
      .map(function (chunk) { return chunk.trim(); })
      .filter(Boolean)
      .map(function (chunk) { return '<p class="body">' + emText(chunk.replace(/\n/g, ' ')) + '</p>'; })
      .join('');
  }
  const BRAND_SVG = '<svg viewBox="0 0 83.42 83.42" xmlns="http://www.w3.org/2000/svg"><g fill="#fff"><path d="M34.97,34.64c-5.6-3.09-11.6-6.29-16.4-8.6l-2,3.47c4.41,3.01,10.18,6.6,15.65,9.9l2.75-4.77Z"/><path d="M51.45,44.16l-2.75,4.76c5.53,3.05,11.42,6.19,16.15,8.47l2-3.47c-4.34-2.96-10-6.49-15.41-9.76Z"/><path d="M38.88,51.37c.12,6.3.36,12.99.76,18.22h4.15c.39-5.23.63-11.92.76-18.22h-5.66Z"/><path d="M44.55,32.34c-.12-6.39-.36-13.19-.76-18.51h-4.15c-.4,5.31-.64,12.12-.76,18.51h5.67Z"/><path d="M64.85,26.03c-7.3,3.52-17.45,9.09-24.57,13.2-7.12,4.11-17.02,10.11-23.72,14.68l2,3.47c7.3-3.52,17.45-9.09,24.57-13.2,7.12-4.11,17.02-10.11,23.72-14.68l-2-3.47Z"/></g></svg>';

  function header(idx) {
    return (
      '<header class="page-header">' +
        '<div class="brand-lockup">' +
          '<span class="brand-mark">' + BRAND_SVG + '</span>' +
          '<div class="brand-text"><span class="wm">cl2</span><span class="tag">Brief ejecutivo</span></div>' +
        '</div>' +
        '<span class="page-num">página <b>' + pad(idx) + '</b> · ' + pad(total) + '</span>' +
      '</header>'
    );
  }
  function footer(slide) {
    const left = (slide.meta && slide.meta.footerLeft) || options.footerLeft || 'Análisis editorial · cl2.cr';
    const right = (slide.meta && slide.meta.footerRight) || options.footerRight || (options.edition || '');
    return (
      '<footer class="page-footer">' +
        '<span class="footer-meta">' + emText(left) + '</span>' +
        '<span class="footer-meta">' + emText(right) + '</span>' +
      '</footer>'
    );
  }

  function bodyContent(slide) {
    const eyebrow = slide.eyebrow ? '<div class="eyebrow">' + emText(slide.eyebrow) + '</div>' : '';
    const isLargeHead = slide.kind === 'cover' || slide.kind === 'cta' || slide.kind === 'section';
    const headTag = isLargeHead
      ? '<h1 class="display">' + emText(slide.headline) + '</h1>'
      : '<h2 class="head">' + emText(slide.headline) + '</h2>';

    let bodyHtml = '';
    if (slide.body) {
      if (slide.kind === 'cover' || slide.kind === 'cta' || slide.kind === 'section') {
        bodyHtml = '<p class="lede">' + emText(slide.body) + '</p>';
      } else if (slide.kind === 'quote') {
        bodyHtml = '';
      } else {
        bodyHtml = bodyToParagraphs(slide.body);
      }
    }
    let extra = '';
    if (slide.kind === 'list' && slide.items && slide.items.length) {
      extra = '<div class="row-list">' + slide.items.slice(0, 6).map(function (it) {
        return '<div class="row"><span class="row-num">' + emText(it.label) + '</span><div>' +
          '<div class="row-title">' + emText(it.value) + '</div>' +
          (it.sub ? '<div class="row-sub">' + emText(it.sub) + '</div>' : '') + '</div></div>';
      }).join('') + '</div>';
    } else if (slide.kind === 'alert' && slide.alert) {
      const cls = 'alert ' + (slide.alert.kind === 'warning' ? 'warning' : slide.alert.kind === 'note' ? 'note' : '');
      const eye = slide.alert.kind === 'warning' ? 'Advertencia CL2' :
                  slide.alert.kind === 'note' ? 'Nota editorial' : 'Recomendación CL2';
      extra = '<div class="' + cls + '">' +
        '<div class="alert-eye">' + emText(eye) + '</div>' +
        '<h3>' + emText(slide.alert.title) + '</h3>' +
        '<p>' + emText(slide.alert.text) + '</p></div>';
    } else if (slide.kind === 'quote' && slide.body) {
      extra = '<div class="quote"><div class="quote-text">' + emText(slide.body) + '</div>' +
        (slide.eyebrow ? '<div class="quote-attr">— ' + emText(slide.eyebrow) + '</div>' : '') + '</div>';
    }
    return '<div class="page-body">' + (slide.kind === 'quote' ? '' : eyebrow) + headTag + bodyHtml + extra + '</div>';
  }

  function classFor(slide) {
    if (slide.kind === 'cover') return 'page cover slide';
    if (slide.kind === 'cta') return 'page cta slide';
    if (slide.kind === 'section') return 'page section slide';
    return 'page slide';
  }

  const root = document.getElementById('doc');
  content.slides.forEach(function (slide, i) {
    const wrap = document.createElement('section');
    wrap.className = classFor(slide);
    let inner = '';
    if (slide.kind === 'cover') inner += '<div class="cover-deco">¶</div>';
    inner += header(slide.idx || (i + 1));
    inner += bodyContent(slide);
    inner += footer(slide);
    wrap.innerHTML = inner;
    root.appendChild(wrap);
  });
  window.__ASSET_RENDERED__ = true;
})();
</script>
</body>
</html>
