version: '3.9'

services:
  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    env_file:
      - ../../.env.local
    ports:
      - "3001:3001"
    restart: unless-stopped

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    env_file:
      - ../../.env.local
    ports:
      - "5173:5173"
    depends_on:
      - api
    restart: unless-stopped

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    env_file:
      - ../../.env.local
    restart: unless-stopped
